{% load static %}
<header>
  <div class="container">
    <nav class="nav">
      <div style="display: flex; align-items: center;">
        <div class="logo">django</div>
        <div class="hero-image" style="width: 100px; margin-left: 10px;">
          <img src="{% static 'img/openart-image_DsdbMeYk_1740823153253_raw.jpg' %}" alt="Creative Design">
        </div>
      </div>

      {% with request.resolver_match.view_name as view_name %}
        <ul class="nav-links">
          <li>
            <a href="{% url 'homepage:home' %}"
               class="nav-link{% if view_name == 'homepage:home' %} active {% endif %}">
              Главная
            </a>
          </li>
          <li>
            <a href="{% url 'forum:forum' %}"
               class="nav-link{% if view_name == 'forum:forum' %} active {% endif %}">
              Форум
            </a>
          </li>
          <li>
            <a href="{% url 'docs:docs' %}"
               class="nav-link{% if view_name == 'docs:docs' %} active {% endif %}">
              Документация
            </a>
          </li>
        </ul>
      {% endwith %}

      <!-- Auth buttons -->
      {% if user.is_authenticated %}
          <span style="color: #ccc; font-size: 14px;">Привет, {{ user.username }}</span>
          <form method="post" action="{% url 'users:logout' %}" style="margin: 0;">
            {% csrf_token %}
            <button type="submit"
                    style="padding: 7px 18px; border-radius: 6px; background-color: #dcc935;
                          color: white; border: none; font-size: 14px; font-weight: 600; cursor: pointer;">
              Выйти
            </button>
          </form>
      {% else %}
          <a href="{% url 'users:login' %}"
             style="padding: 7px 18px; border-radius: 6px; border: 2px solid #007bff;
                    color: #007bff; text-decoration: none; font-size: 14px; font-weight: 600;">
            Войти
          </a>
          <a href="{% url 'users:register' %}"
             style="padding: 7px 18px; border-radius: 6px; background-color: #007bff;
                    color: white; text-decoration: none; font-size: 14px; font-weight: 600;">
            Регистрация
          </a>
        {% endif %}
      </div>

    </nav>
  </div>
</header>
